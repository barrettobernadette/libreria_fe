<ng-container *ngIf="listAutori$ | async as listAutori">
    <table mat-table [dataSource]="listAutori" class="mat-elevation-z8">
        <ng-container matColumnDef="img">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let autore">
                <img class="imgHome" [src]="autore.imgUrl" alt="">
            </td>
        </ng-container>
        <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef>Nome</th>
            <td mat-cell *matCellDef="let autore">{{autore.nome}}</td>
        </ng-container>
        <ng-container matColumnDef="cognome">
            <th mat-header-cell *matHeaderCellDef>Cognome</th>
            <td mat-cell *matCellDef="let autore">{{autore.cognome}}</td>
        </ng-container>
        <ng-container matColumnDef="website">
            <th mat-header-cell *matHeaderCellDef>Website</th>
            <td mat-cell *matCellDef="let autore"> 
                <a [href]="autore.website" target="_blank" rel="noopener noreferrer">{{autore.website}}</a>
            </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
</ng-container> 

<ng-container *ngIf="listLibri$  | async as books">
    <div class="carousel slide" data-bs-ride="carousel" id="booksCarousel">

        <div class="carousel-indicators">
            <button *ngFor="let book of books; let i = index" type="button" data-bs-target="#booksCarousel" 
                [attr.data-bs-slide-to]="i"
                [class.active]="i === 0">
            </button>
        </div>

        <div class="carousel-inner">
            <div *ngFor="let book of books; let i = index" class="carousel-item" [class.active]="i===0"> <!-- inserito controllo per rendere attivo solo il primo elemento -->
                <div class="container py-4">
                    <div class="row align-items-center"><!-- meglio usare grid in questo caso--> 
                        <div class="col-4">
                            <img [src]="book.copertinaUrl" [alt]="book.titolo" class="img-fluid rounded book-img">
                        </div>
                        <div class="col-8">
                            <h3 class="fw-bold">{{ book.titolo }}</h3>
                            <h5 class="text-muted">{{ book.autore.nome }} {{ book.autore.cognome }}</h5>
                            <p class="mt-3">{{book.descrizione}}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#booksCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#booksCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div> 
</ng-container>
