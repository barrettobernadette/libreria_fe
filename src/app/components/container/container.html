  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a routerLink="/">Home</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="d-flex flex-row-reverse collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <ng-container *ngFor="let item of navbarItems;">
                    <li class="nav-item" *ngIf="item.requiresAuth === null || item.requiresAuth === (isLoggedIn | async)">
                        <a *ngIf="item.label ==='Logout'" 
                            [class]="item.class" 
                            (click)="logout()">
                                {{item.label}}
                        </a>
                        <a *ngIf="item.label !== 'Logout'" 
                            [class]="item.class" 
                            [routerLink]="item.routerLink">
                                {{ item.label }}
                        </a>
                    </li>
                </ng-container>
            </ul>
        </div>
    </div>
</nav>
<router-outlet></router-outlet>
